name: build-publish

on:
  push:
    branches:
      - main

jobs:
  build-publish:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - run: name=coilysiren-eco-mcp-app make .build-docker
      - run: docker tag coilysiren-eco-mcp-app:latest ghcr.io/${{ github.repository }}/coilysiren-eco-mcp-app:${{ github.sha }}
      - run: docker push ghcr.io/${{ github.repository }}/coilysiren-eco-mcp-app:${{ github.sha }}
